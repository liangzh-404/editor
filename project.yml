name: Editor
options:
  bundleIdPrefix: com.liangzhang
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
packages:
  HighlightSwift:
    url: https://github.com/appstefan/highlightswift.git
    from: 1.1.0
targets:
  EditorMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/EditorApp
      - path: Sources/EditorCore
    dependencies:
      - package: HighlightSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liangzhang.editor.mac
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Editor
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/EditorApp/EditorMac.entitlements
        OTHER_LDFLAGS: "$(inherited) -lsqlite3"
  EditorIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/EditorApp
      - path: Sources/EditorCore
    dependencies:
      - package: HighlightSwift
    info:
      path: Sources/EditorApp/EditorIOS-Info.plist
      properties:
        CFBundleDisplayName: Editor
        NSHumanReadableCopyright: ""
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liangzhang.editor.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/EditorApp/EditorIOS.entitlements
        OTHER_LDFLAGS: "$(inherited) -lsqlite3"
  EditorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/EditorTests
      - path: Sources/EditorCore
    dependencies:
      - package: HighlightSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liangzhang.editor.tests
        GENERATE_INFOPLIST_FILE: "YES"
        OTHER_LDFLAGS: "$(inherited) -lsqlite3"
  EditorMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/EditorMacUITests
    dependencies:
      - target: EditorMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liangzhang.editor.mac.uitests
        GENERATE_INFOPLIST_FILE: "YES"
  EditorIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/EditorIOSUITests
    dependencies:
      - target: EditorIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liangzhang.editor.ios.uitests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  EditorMac:
    build:
      targets:
        EditorMac: all
  EditorIOS:
    build:
      targets:
        EditorIOS: all
  EditorTests:
    build:
      targets:
        EditorTests: all
    test:
      gatherCoverageData: false
      targets:
        - EditorTests
  EditorMacUITests:
    build:
      targets:
        EditorMac: all
        EditorMacUITests: all
    test:
      gatherCoverageData: false
      targets:
        - EditorMacUITests
  EditorIOSUITests:
    build:
      targets:
        EditorIOS: all
        EditorIOSUITests: all
    test:
      gatherCoverageData: false
      targets:
        - EditorIOSUITests
